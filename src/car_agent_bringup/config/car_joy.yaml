# 手柄 → /cmd_vel 映射配置
teleop_twist_joy_node:
  ros__parameters:
    enable_button: 4          # LB (左肩键)
    enable_turbo_button: 5    # RB (右肩键)
    axis_linear:
      x: 1                   # 左摇杆 Y 轴
    axis_angular:
      yaw: 3                   # 右摇杆 X 轴
    scale_linear:
      x: 1.0
    scale_angular:
      yaw: 1.5
    scale_linear_turbo:
      x: 2.0
    scale_angular_turbo:
      yaw: 2.5
