# N10P 镭神 LiDAR 配置
/lslidar_driver_node:
  ros__parameters:
    lidar_name: "N10_P"
    frame_id: "laser_link"
    interface_selection: "serial"
    serial_port_: "/dev/ttyACM0"
    device_ip: "192.168.1.200"
    device_ip_difop: "192.168.1.102"
    msop_port: 2368
    difop_port: 2369
    group_ip: "224.1.1.2"
    add_multicast: false
    pubScan: true
    pubPointCloud2: false
    scan_topic: "/scan"
    pointcloud_topic: "/lslidar_point_cloud"
    min_range: 0.2
    max_range: 12.0
    angle_disable_min: 0.0
    angle_disable_max: 0.0
    use_gps_ts: false
    high_reflection: false
    compensation: false
